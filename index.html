<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lohnrechner – GHB</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;--accent:#d4ff4e;--accent2:#ff6b35;--text:#f0f0f0;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
    .page{display:none;padding:2rem 1rem;max-width:600px;margin:0 auto;}
    .page.active{display:block;}

    /* ── Sayfa 1: Firma Listesi ── */
    .app-header{margin-bottom:2.5rem;}
    .app-header h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,6vw,3rem);font-weight:800;letter-spacing:-2px;line-height:1;}
    .app-header h1 span{color:var(--accent);}
    .app-header p{margin-top:.5rem;color:#bbb;font-size:.82rem;}

    .firma-list{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1rem;}
    .firma-row{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;cursor:pointer;transition:all .15s;position:relative;}
    .firma-row:hover{border-color:#555;}
    .firma-dot{width:12px;height:12px;border-radius:50%;margin-right:1rem;flex-shrink:0;}
    .firma-row-name{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;flex:1;}
    .firma-row-sub{font-size:.75rem;color:#bbb;margin-top:2px;}
    .firma-row-arrow{color:#555;font-size:1.1rem;margin-left:.5rem;}
    .firma-row-actions{display:flex;gap:4px;margin-left:.5rem;}
    .btn-icon{background:rgba(255,255,255,.06);border:1px solid #333;border-radius:5px;color:#bbb;cursor:pointer;font-size:.7rem;padding:4px 7px;}
    .btn-icon:hover{color:#fff;}

    .btn-add-firma{display:flex;align-items:center;justify-content:center;gap:.6rem;background:transparent;border:2px dashed var(--border);border-radius:12px;padding:1.1rem;cursor:pointer;color:#888;font-family:'DM Mono',monospace;font-size:.9rem;transition:all .15s;width:100%;}
    .btn-add-firma:hover{border-color:var(--accent);color:var(--accent);}

    /* Vardiya özeti bölümü */
    .monthly-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-top:1.5rem;}
    .monthly-title{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:#bbb;margin-bottom:1rem;}
    .monthly-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1rem;}
    .m-box{background:var(--bg);border-radius:8px;padding:.8rem;border:1px solid var(--border);}
    .m-box .ml{font-size:.65rem;color:#bbb;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
    .m-box .mv{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;}
    .vardiya-mini{display:flex;flex-direction:column;gap:.4rem;max-height:200px;overflow-y:auto;}
    .vm-item{display:flex;justify-content:space-between;align-items:center;font-size:.8rem;padding:.4rem .6rem;background:var(--bg);border-radius:6px;}
    .vm-left{display:flex;align-items:center;gap:.5rem;}
    .vm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .vm-meta{color:#bbb;font-size:.72rem;}
    .empty-list{text-align:center;color:#555;padding:1.5rem;font-size:.83rem;}
    .btn-x-small{background:none;border:none;color:#555;cursor:pointer;font-size:.85rem;padding:2px 4px;}
    .btn-x-small:hover{color:var(--accent2);}

    /* ── Sayfa 2: Firma Detay ── */
    .back-btn{display:flex;align-items:center;gap:.5rem;background:none;border:none;color:#bbb;cursor:pointer;font-family:'DM Mono',monospace;font-size:.85rem;margin-bottom:1.5rem;padding:0;}
    .back-btn:hover{color:#fff;}
    .firma-header{margin-bottom:2rem;}
    .firma-header h2{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-1px;}
    .firma-header .fh-sub{font-size:.8rem;color:#bbb;margin-top:.3rem;}

    .schicht-cards{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1.5rem;}
    .schicht-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .schicht-card-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;cursor:pointer;transition:background .15s;}
    .schicht-card-header:hover{background:#222;}
    .sch-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
    .sch-time{font-size:.75rem;color:#bbb;margin-top:2px;}
    .sch-badge{font-size:.75rem;padding:3px 10px;border-radius:20px;font-weight:600;}
    .sch-arrow{color:#555;transition:transform .2s;}
    .sch-arrow.open{transform:rotate(90deg);}

    .schicht-card-body{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid var(--border);}
    .schicht-card-body.open{display:block;}

    /* Zulage listesi */
    .zulage-list{display:flex;flex-direction:column;gap:.5rem;margin:1rem 0;}
    .zulage-item{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border-radius:7px;padding:.6rem .8rem;font-size:.83rem;}
    .zulage-name{color:#ddd;}
    .zulage-val{color:var(--accent);font-weight:600;}
    .zulage-val.unknown{color:#ff6b35;}

    /* Tarih seçimi + ekle */
    .add-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-top:.8rem;}
    label{font-size:.78rem;color:#ddd;display:block;margin-bottom:4px;}
    input,select{background:#111;border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:.88rem;padding:.55rem .8rem;outline:none;width:100%;transition:border-color .15s;}
    input:focus,select:focus{border-color:var(--accent);}
    .btn-add-vardiya{background:var(--accent);color:#000;border:none;border-radius:7px;padding:.65rem;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;width:100%;margin-top:.8rem;transition:opacity .15s;}
    .btn-add-vardiya:hover{opacity:.85;}
    .ub-preview{background:#ff6b3512;border:1px solid #ff6b3535;border-radius:6px;padding:.5rem .8rem;font-size:.75rem;color:#ff6b35;margin-top:.6rem;display:none;}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
    .modal{background:#1c1c1c;border:1px solid #333;border-radius:14px;padding:1.8rem;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
    .modal h3{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:1.2rem;}
    .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem;}
    .full{grid-column:1/-1;}
    .sep{grid-column:1/-1;border-top:1px solid #333;padding-top:.8rem;margin-top:.2rem;font-size:.7rem;color:#bbb;letter-spacing:2px;text-transform:uppercase;}
    .modal-actions{display:flex;gap:.8rem;margin-top:1.2rem;}
    .btn-cancel{flex:1;background:#111;border:1px solid #444;border-radius:6px;color:#ddd;font-family:'DM Mono',monospace;font-size:.85rem;padding:.6rem;cursor:pointer;}
    .note{font-size:.72rem;color:#bbb;margin-top:.8rem;line-height:1.6;}
    @media(max-width:400px){.add-row,.monthly-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════
     SAYFA 1: ANA SAYFA – FİRMA LİSTESİ
═══════════════════════════════════════════════════════ -->
<div class="page active" id="page-home">
  <div class="app-header">
    <h1>LOHN<span>RECHNER</span></h1>
    <p>Steuerklasse 1 · 23 Jahre · GHB</p>
  </div>

  <div class="firma-list" id="firma-list"></div>
  <button class="btn-add-firma" onclick="openModal(null)">+ Firma Ekle</button>

  <div class="monthly-card">
    <p class="monthly-title">Bu Ay</p>
    <div class="monthly-grid">
      <div class="m-box"><div class="ml">Brüt Toplam</div><div class="mv" id="home-brutto" style="color:#d4ff4e">0,00 €</div></div>
      <div class="m-box"><div class="ml">Net Tahmini</div><div class="mv" id="home-netto" style="color:#ff6b35">0,00 €</div></div>
      <div class="m-box"><div class="ml">Çalışılan Gün</div><div class="mv" id="home-tage">0</div></div>
      <div class="m-box"><div class="ml">Toplam Saat</div><div class="mv" id="home-std">0,00</div></div>
    </div>
    <div class="vardiya-mini" id="vardiya-mini"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     SAYFA 2: FİRMA DETAY
═══════════════════════════════════════════════════════ -->
<div class="page" id="page-firma">
  <button class="back-btn" onclick="goHome()">← Geri</button>
  <div class="firma-header">
    <h2 id="detail-firma-name">—</h2>
    <p class="fh-sub" id="detail-firma-sub">—</p>
  </div>
  <div class="schicht-cards" id="schicht-cards"></div>
</div>

<!-- ═══════════════════════════════════════════════════════
     MODAL: FİRMA EKLE / DÜZENLE
═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title">Firma Ekle</h3>
    <div class="modal-grid">
      <div class="full"><label>Firma Adı *</label><input id="m-name" placeholder="örn. HAPAG"/></div>
      <div class="full"><label>Temel Saat Ücreti (€/Std.)</label><input id="m-satz" type="number" step="0.01" placeholder="örn. 22.79"/></div>
      <div><label>Zulage AA (€)</label><input id="m-zaa" type="number" step="0.01" value="32.14"/></div>
      <div><label>Schmutz-/Kühlg. (€)</label><input id="m-schmutz" type="number" step="0.01" value="0"/></div>
      <div><label>Fahrgeld (€)</label><input id="m-fahrgeld" type="number" step="0.01" value="0"/></div>
      <div><label>Zulage A (€)</label><input id="m-zulageA" type="number" step="0.01" value="0"/></div>
      <div class="sep">⏱ Überstunden</div>
      <div><label>Normal saat eşiği</label><input id="m-ubschwelle" type="number" step="0.5" placeholder="örn. 13"/></div>
      <div><label>Zam oranı</label>
        <select id="m-ubzam">
          <option value="">— Bilmiyorum —</option>
          <option value="1.25">%25 zam (×1.25)</option>
          <option value="1.50">%50 zam (×1.50)</option>
          <option value="2.00">%100 zam (×2.00)</option>
        </select>
      </div>
    </div>
    <p class="note">💡 Bilmediğin alanları boş bırak, sonra ✏️ ile düzenleyebilirsin.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">İptal</button>
      <button class="btn-primary" onclick="saveFirma()" style="flex:2;background:var(--accent);color:#000;border:none;border-radius:6px;padding:.65rem;font-family:Syne,sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;">Kaydet</button>
    </div>
  </div>
</div>

<script>
const PALETTE=['#4ecdc4','#ff6b9d','#ffd166','#06d6a0','#a78bfa','#fb923c','#38bdf8','#f472b6','#a3e635','#f87171'];
let colorIdx=0;
function nextColor(){return PALETTE[colorIdx++%PALETTE.length];}

// Schicht tanımları
const SCHICHTEN=[
  {id:1,name:'Schicht 1',time:'07:00 – 15:00'},
  {id:2,name:'Schicht 2',time:'15:00 – 23:00'},
  {id:3,name:'Schicht 3',time:'23:00 – 07:00'},
];

const DEFAULT_FIRMEN=[
  {id:'KS',       name:'K+S',      color:'#4ecdc4',stundenSatz:26.14,zulageAA:32.14,schmutz:10.87,fahrgeld:0,   zulageA:0,   ubSchwelle:null,ubZam:null},
  {id:'TIEDEMANN',name:'TIEDEMANN',color:'#ff6b9d',stundenSatz:22.79,zulageAA:32.14,schmutz:0,    fahrgeld:2.35,zulageA:0,   ubSchwelle:13,  ubZam:null},
  {id:'SWOP',     name:'SWOP',     color:'#ffd166',stundenSatz:22.79,zulageAA:32.14,schmutz:0,    fahrgeld:3.68,zulageA:21.92,ubSchwelle:null,ubZam:null},
];

function ls(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function saveFLS(){localStorage.setItem('ghb_firmen',JSON.stringify(firmen));}
function saveSLS(){localStorage.setItem('ghb_schichten',JSON.stringify(schichten));}

let firmen   =ls('ghb_firmen',   DEFAULT_FIRMEN);
let schichten=ls('ghb_schichten',[]);
let currentFirmaId=null, editId=null;
colorIdx=firmen.length;

// ── Hesaplama ─────────────────────────────────────────────────────────────
function calcBrutto(f,std){
  let ns=std,us=0;
  if(f.ubSchwelle&&std>f.ubSchwelle){ns=f.ubSchwelle;us=std-f.ubSchwelle;}
  return f.stundenSatz*ns+(f.ubZam?f.stundenSatz*us*f.ubZam:f.stundenSatz*us)
        +(f.zulageAA||0)+(f.schmutz||0)+(f.fahrgeld||0)+(f.zulageA||0);
}
function calcAbz(b){
  const kv=b*.073,rv=b*.093,av=b*.013,pv=b*.017,sv=kv+rv+av+pv,zvE=Math.max(0,b-sv);
  let lst=0;
  if(zvE>66760)lst=zvE*.42-10602;
  else if(zvE>17005)lst=(zvE-17005)*.2397+689;
  else if(zvE>12084)lst=(zvE-12084)*.14;
  return{kv,rv,av,pv,lst:Math.max(0,lst/12),soli:0};
}
function fmt(n){return n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function today(){return new Date().toISOString().slice(0,10);}

// ── Sayfa geçişleri ───────────────────────────────────────────────────────
function goHome(){
  document.getElementById('page-home').classList.add('active');
  document.getElementById('page-firma').classList.remove('active');
  renderHome();
}
function goFirma(id){
  currentFirmaId=id;
  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-firma').classList.add('active');
  renderFirmaPage(id);
}

// ── Sayfa 1 render ────────────────────────────────────────────────────────
function renderHome(){
  // Firma listesi
  document.getElementById('firma-list').innerHTML=firmen.map(f=>`
    <div class="firma-row" onclick="goFirma('${f.id}')">
      <div class="firma-dot" style="background:${f.color}"></div>
      <div style="flex:1">
        <div class="firma-row-name">${f.name}</div>
        <div class="firma-row-sub">${f.stundenSatz?f.stundenSatz.toFixed(2)+' €/Std.':'Ücret girilmedi'}</div>
      </div>
      <div class="firma-row-actions" onclick="event.stopPropagation()">
        <button class="btn-icon" onclick="openModal('${f.id}')">✏️</button>
        <button class="btn-icon" onclick="delFirma('${f.id}')">✕</button>
      </div>
      <span class="firma-row-arrow">›</span>
    </div>`).join('');

  // Özet
  const tb=schichten.reduce((a,s)=>a+s.brutto,0);
  const ts=schichten.reduce((a,s)=>a+s.std,0);
  const abz=calcAbz(tb);
  const ta=Object.values(abz).reduce((a,v)=>a+v,0);
  document.getElementById('home-brutto').textContent=fmt(tb);
  document.getElementById('home-netto').textContent=fmt(Math.max(0,tb-ta));
  document.getElementById('home-tage').textContent=schichten.length;
  document.getElementById('home-std').textContent=ts.toFixed(2);

  // Vardiya mini liste
  const mini=document.getElementById('vardiya-mini');
  if(!schichten.length){mini.innerHTML='<div class="empty-list">Henüz vardiya eklenmedi.</div>';return;}
  mini.innerHTML=[...schichten].reverse().map(s=>{
    const f=firmen.find(x=>x.id===s.firmaId);
    const sc=SCHICHTEN.find(x=>x.id===s.schicht);
    return`<div class="vm-item">
      <div class="vm-left">
        <div class="vm-dot" style="background:${f?f.color:'#888'}"></div>
        <div>
          <div>${f?f.name:s.firmaId} · ${sc?sc.name:'Sch.'+s.schicht}</div>
          <div class="vm-meta">${s.datum} · ${s.std} Std.</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span style="font-weight:600">${fmt(s.brutto)}</span>
        <button class="btn-x-small" onclick="delSchicht(${s.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ── Sayfa 2 render ────────────────────────────────────────────────────────
function renderFirmaPage(id){
  const f=firmen.find(x=>x.id===id);
  if(!f)return;
  document.getElementById('detail-firma-name').textContent=f.name;
  document.getElementById('detail-firma-name').style.color=f.color;
  document.getElementById('detail-firma-sub').textContent=
    (f.stundenSatz?f.stundenSatz.toFixed(2)+' €/Std. · ':'')+'Steuerklasse 1 · GHB';

  document.getElementById('schicht-cards').innerHTML=SCHICHTEN.map(sc=>{
    const daySchichten=schichten.filter(s=>s.firmaId===id&&s.schicht===sc.id);
    const total=daySchichten.reduce((a,s)=>a+s.brutto,0);
    const badge=daySchichten.length?
      `<span class="sch-badge" style="background:${f.color}22;color:${f.color}">${daySchichten.length} vardiya · ${fmt(total)}</span>`:
      `<span class="sch-badge" style="background:#ffffff10;color:#666">Vardiya yok</span>`;

    // Zulage listesi
    const zulagen=[];
    if(f.zulageAA)  zulagen.push({name:'Zulage AA',    val:f.zulageAA,  known:true});
    if(f.schmutz)   zulagen.push({name:'Schmutz-/Kühlg.',val:f.schmutz, known:true});
    if(f.fahrgeld)  zulagen.push({name:'Fahrgeld',     val:f.fahrgeld,  known:true});
    if(f.zulageA)   zulagen.push({name:'Zulage A',     val:f.zulageA,   known:true});
    if(f.ubSchwelle)zulagen.push({
      name:`Überstunden (>${f.ubSchwelle}h)`,
      val:f.ubZam?`×${f.ubZam} (%${Math.round((f.ubZam-1)*100)} zam)`:'Oran girilmedi',
      known:!!f.ubZam
    });

    const zulageHtml=zulagen.length?zulagen.map(z=>`
      <div class="zulage-item">
        <span class="zulage-name">${z.name}</span>
        <span class="zulage-val${z.known?'':' unknown'}">${typeof z.val==='number'?fmt(z.val):z.val}</span>
      </div>`).join(''):`<div style="font-size:.78rem;color:#555;padding:.4rem 0">Ekstra zulage yok</div>`;

    // O schicht için vardiya listesi
    const vardiyaHtml=daySchichten.length?daySchichten.map(s=>`
      <div class="vm-item" style="margin-top:.4rem">
        <div class="vm-left">
          <div>${s.datum} · ${s.std} Std.</div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span style="font-weight:600">${fmt(s.brutto)}</span>
          <button class="btn-x-small" onclick="delSchicht(${s.id});renderFirmaPage('${id}')">✕</button>
        </div>
      </div>`).join(''):'';

    return`<div class="schicht-card">
      <div class="schicht-card-header" onclick="toggleSchicht('sc-${id}-${sc.id}')">
        <div>
          <div class="sch-title">${sc.name}</div>
          <div class="sch-time">${sc.time}</div>
        </div>
        <div style="display:flex;align-items:center;gap:.6rem">
          ${badge}
          <span class="sch-arrow" id="arr-sc-${id}-${sc.id}">›</span>
        </div>
      </div>
      <div class="schicht-card-body" id="sc-${id}-${sc.id}">
        <div class="zulage-list">${zulageHtml}</div>
        ${vardiyaHtml}
        <div class="add-row" style="margin-top:.8rem">
          <div><label>Tarih</label><input type="date" id="d-${id}-${sc.id}" value="${today()}"/></div>
          <div><label>Saat (Std.)</label><input type="number" id="s-${id}-${sc.id}" value="7.67" step="0.01" min="1" max="24" oninput="updateUbPrev('${id}','${sc.id}')"/></div>
        </div>
        <div class="ub-preview" id="ubp-${id}-${sc.id}"></div>
        <button class="btn-add-vardiya" onclick="addSchicht('${id}',${sc.id})">+ Vardiya Ekle</button>
      </div>
    </div>`;
  }).join('');
}

function toggleSchicht(elId){
  const body=document.getElementById(elId);
  const arr=document.getElementById('arr-'+elId);
  const open=body.classList.toggle('open');
  arr.classList.toggle('open',open);
}

function updateUbPrev(firmaId,schichtId){
  const f=firmen.find(x=>x.id===firmaId);
  const prev=document.getElementById(`ubp-${firmaId}-${schichtId}`);
  if(!f||!prev)return;
  const std=parseFloat(document.getElementById(`s-${firmaId}-${schichtId}`).value)||0;
  if(f.ubSchwelle&&std>f.ubSchwelle){
    const us=(std-f.ubSchwelle).toFixed(2);
    const zl=f.ubZam?`×${f.ubZam} (%${Math.round((f.ubZam-1)*100)} zam)`:'⚠ oran girilmedi';
    prev.style.display='block';
    prev.textContent=`⏱ ${f.ubSchwelle}h normal + ${us}h überstunde (${zl})`;
  } else {
    prev.style.display='none';
  }
}

// ── Actions ───────────────────────────────────────────────────────────────
function addSchicht(firmaId,schichtId){
  const f=firmen.find(x=>x.id===firmaId);
  if(!f?.stundenSatz){alert('Bu firmanın saat ücreti girilmemiş. Geri dönüp ✏️ ile düzenle.');return;}
  const datum=document.getElementById(`d-${firmaId}-${schichtId}`).value;
  const std=parseFloat(document.getElementById(`s-${firmaId}-${schichtId}`).value);
  if(!datum||isNaN(std)){alert('Tarih ve saat girin.');return;}
  const brutto=calcBrutto(f,std);
  let ubStd=0;
  if(f.ubSchwelle&&std>f.ubSchwelle)ubStd=std-f.ubSchwelle;
  schichten.push({id:Date.now(),firmaId,datum,schicht:schichtId,std,brutto,ubStd});
  saveSLS();
  renderFirmaPage(firmaId);
}

function delSchicht(id){
  schichten=schichten.filter(s=>s.id!==id);
  saveSLS();
  if(currentFirmaId)renderFirmaPage(currentFirmaId);
  renderHome();
}

function delFirma(id){
  if(!confirm('Bu firmayı sil?'))return;
  firmen=firmen.filter(f=>f.id!==id);
  saveFLS();renderHome();
}

// ── Modal ─────────────────────────────────────────────────────────────────
function openModal(id){
  editId=id;
  document.getElementById('modal-title').textContent=id?'Firma Düzenle':'Firma Ekle';
  const f=id?firmen.find(x=>x.id===id):{};
  document.getElementById('m-name').value      =f.name||'';
  document.getElementById('m-satz').value      =f.stundenSatz||'';
  document.getElementById('m-zaa').value       =f.zulageAA??32.14;
  document.getElementById('m-schmutz').value   =f.schmutz||0;
  document.getElementById('m-fahrgeld').value  =f.fahrgeld||0;
  document.getElementById('m-zulageA').value   =f.zulageA||0;
  document.getElementById('m-ubschwelle').value=f.ubSchwelle||'';
  document.getElementById('m-ubzam').value     =f.ubZam||'';
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}
function saveFirma(){
  const name=document.getElementById('m-name').value.trim();
  if(!name){alert('Firma adı zorunlu!');return;}
  const data={
    name,
    stundenSatz:parseFloat(document.getElementById('m-satz').value)||0,
    zulageAA:   parseFloat(document.getElementById('m-zaa').value)||0,
    schmutz:    parseFloat(document.getElementById('m-schmutz').value)||0,
    fahrgeld:   parseFloat(document.getElementById('m-fahrgeld').value)||0,
    zulageA:    parseFloat(document.getElementById('m-zulageA').value)||0,
    ubSchwelle: parseFloat(document.getElementById('m-ubschwelle').value)||null,
    ubZam:      parseFloat(document.getElementById('m-ubzam').value)||null,
  };
  if(editId){firmen=firmen.map(f=>f.id===editId?{...f,...data}:f);}
  else{firmen.push({id:'F'+Date.now(),color:nextColor(),...data});}
  saveFLS();closeModal();renderHome();
}

renderHome();
</script>
</body>
</html>
